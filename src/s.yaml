edition: 3.0.0
name: agentrun-integration-template
access: '{{ access }}'
vars:
  region: '{{ region }}'
  agent_name: '{{ agentRuntimeName }}'
  role: '{{ role }}'

resources:
  opinion_analysis:
    component: agentrun
    props:
      region: ${vars.region}

      agent:
        # 基本信息
        name: ${vars.agent_name}
        description: 'opinion_analysise'

        code:
          src: ./backend
          language: python3.12
          command:
            - python3
            - src/main.py

        # 资源配置
        cpu: 1.0
        memory: 2048

        # 端口和并发
        port: 8000
        instanceConcurrency: 200

        # 网络配置 - 仅公网访问
        internetAccess: true

        # 环境变量
        environmentVariables:
          PYTHONPATH: /code/python:/opt/python:/code:/code/python

          AGENTRUN_MODEL_NAME: '{{ modelServiceName }}'
          MODEL_NAME: '{{ modelName }}'
          AGENTRUN_BROWSER_SANDBOX_NAME: '{{ browserTemplate }}'
          
        # 日志配置
        # logConfig: auto
        role: ${vars.role}

        # 端点配置
        endpoints:
          - name: prod
            version: LATEST
            description: '生产环境端点'

  main_web:
    component: fc3
    props:
      region: ${vars.region}

      functionName: ${vars.agent_name}_web
      description: 'opinion_analysise'

      runtime: custom
      code: ./frontend/out
      customRuntimeConfig:
        command:
          - node
          - index.js

      # 资源配置
      cpu: 0.5
      memory: 512
      diskSize: 512

      # 端口和并发
      port: 8000
      instanceConcurrency: 200

      # 网络配置 - 仅公网访问
      internetAccess: true

      environmentVariables:
        ENDPOINT: '${resources.opinion_analysis.output.agent.endpoints.0.url}'

      customDomain:
        protocol: 'HTTP'
        route:
          path: '/*'
          qualifier: 'LATEST'
        domainName: auto
