Edition: 3.0.0
Type: Project
Name: opinion_analysis
Version: 0.0.5
Provider:
  - 阿里云
Description: 基于AgentRun开发的舆情分析系统
HomePage: https://github.com/devsapp/agentrun-template
Tags: #标签详情
  - PydanticAI 
  - 单智能体
  - 舆情分析
  - AG-UI
  - 浏览器沙箱
Category: 人工智能
# Organization: 函数计算（FC）
Service:
  函数计算:
    Authorities:
      - AliyunFCFullAccess
    Description: 函数调用服务
Effective: Public
Parameters:
  type: object
  additionalProperties: false
  required: # 必填项
    - region
    - role
    - modelName
    - modelServiceName
    - agentRuntimeName
    - browserTemplate
  properties:
    region:
      title: 地域
      type: string
      default: cn-hangzhou
      description: 创建应用所在的地区
      enum:
        - cn-beijing
        - cn-hangzhou
    agentRuntimeName:
      title: AgentRuntime运行时名称
      type: string
      default: 'opinion_analysis'
      pattern: "^[a-zA-Z_][a-zA-Z0-9-_:/.]{0,127}$"
      description: agentrun的唯一名称
      x-hidden: true
      x-random: true
    role:
      title: 权限配置
      type: string
      default: AliyunAgentRunDefaultRole
      description: AgentRun的全权限
      required: true
      x-role:
        name: AliyunAgentRunDefaultRole # 角色名
        service: FC # 服务账号
        authorities:
          - AliyunAgentRunFullAccess
          - AliyunDevsReadOnlyAccess
    modelServiceName:
      title: 大语言模型
      type: string
      pattern: '^[a-zA-Z_][a-zA-Z0-9-_:/.]{0,127}$'
      description: 请选择大语言模型
      x-agentrun-model-llm-provider-name: true

    modelName:
      title: 模型名称
      type: string
      description: 模型名称，建议使用 qwen3-max
      x-agentrun-model-llm: true
    
    browserTemplate:
      title: 浏览器沙箱
      type: string
      default: ''
      pattern: "^[a-zA-Z_][a-zA-Z0-9-_:/.]{0,127}$"
      description: 请选择浏览器沙箱
      x-agentrun-sandbox: browser
  