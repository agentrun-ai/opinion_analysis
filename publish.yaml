Edition: 3.0.0
Type: Project
Name: opinion_analysis
Version: dev
Provider:
  - 阿里云
Description: 基于AgentRun开发的舆情分析系统
HomePage: https://github.com/devsapp/agentrun-template
Tags: #标签详情
  - AIGC
  - LLM
  - 智能体
  - deepseek
  - 通义千问
  - MCP
Category: 人工智能
# Organization: 函数计算（FC）
Service:
  函数计算:
    Authorities:
      - AliyunFCFullAccess
    Description: 函数调用服务
Effective: Public
Parameters:
  type: object
  additionalProperties: false
  required: # 必填项
    - region
    - functionName
    - role
    - agentrun_model
  properties:
    region:
      title: 地域
      type: string
      default: cn-hangzhou
      description: 创建应用所在的地区
      enum:
        - cn-beijing
        - cn-hangzhou
    functionName:
      title: AgentRuntime运行时名称
      type: string
      default: 'opinion_analysis_${default-suffix}'
      pattern: "^[a-zA-Z_][a-zA-Z0-9-_:/.]{0,127}$"
      description: AgentRuntime运行时名称
    role:
      title: 运行时角色
      type: string
      default: 'agentrun-role'
      description: 函数计算的全权限
      required: true
      x-role:
        name: agentrun-role # 角色名
        service: FC # 服务账号
        authorities:
          - AliyunAgentRunFullAccess
    agentrun_model:
      title: AgentRun 模型
      type: string
      default: ''
      pattern: "^[a-zA-Z_][a-zA-Z0-9-_:/.]{0,127}$"
      description: 填入 Agentrun 中创建好的模型。为了确保效果，请使用 qwen3-max 模型（放置在模型列表的第一个位置）
    search_tool:
      title: 搜索工具名（建议使用百度搜索工具）
      type: string
      default: ''
      pattern: "^[a-zA-Z_][a-zA-Z0-9-_:/.]{0,127}$"
      description: 填入 Agentrun 中百度搜索工具名称
    browser_template:
      title: Sandbox Browser 模板名，可选
      type: string
      default: ''
      pattern: "^[a-zA-Z_][a-zA-Z0-9-_:/.]{0,127}$"
      description: 填入AgentRun中创建好的 Browser 模板
    code_interpreter_template:
      title: Sandbox Code Interpreter 模板名，可选
      type: string
      default: ''
      pattern: "^[a-zA-Z_][a-zA-Z0-9-_:/.]{0,127}$"
      description: 填入AgentRun中创建好的 CodeInterpreter 模板